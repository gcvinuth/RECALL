<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <title>Recall</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="toast"></div>

    <div id="app-container">
        <!-- Home View -->
        <div id="homeView" class="view active">
            <h1>Recall</h1>
            <div class="record-container">
                <div id="recordBtn" class="record-button">
                    <svg class="mic-icon" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.39-.9.88 0 2.76-2.24 5-5 5s-5-2.24-5-5c0-.49-.41-.88-.9-.88s-.9.39-.9.88c0 3.72 2.88 6.78 6.5 7.23V21h1.8v-2.88c3.62-.45 6.5-3.51 6.5-7.23 0-.49-.41-.88-.9-.88z"/>
                    </svg>
                </div>
                <div id="statusText" class="status-text">Hold to speak</div>
            </div>
            
            <div style="margin-top:20px; font-size:12px; color:var(--text-sub); text-align:center;">
                e.g., "Send John a message saying Hello tomorrow at 8pm"
            </div>
        </div>

        <!-- People View -->
        <div id="peopleView" class="view">
            <h1>Connections</h1>
            <div id="peopleList"></div>
        </div>

        <!-- Intents View -->
        <div id="intentsView" class="view">
            <h1>Pending Intents</h1>
            <div id="intentsList"></div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="#home" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Home
            </a>
            <a href="#people" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                People
            </a>
            <a href="#intents" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
                Intents
            </a>
        </nav>
    </div>

    <script type="module" src="/app.js"></script>
</body>
</html>
